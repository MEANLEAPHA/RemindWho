<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RSVP Reminder</title>
</head>
<body style="margin:0; padding:0; font-family:Arial, sans-serif; background-color:#f4f4f4;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px;">
    <tr>
      <td align="center">
        <!-- Card -->
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background-color:#ff6600; padding:20px; text-align:center; color:#fff; font-size:24px; font-weight:bold;">
              RSVP Reminder
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:30px; text-align:left; color:#333;">
              <h2 style="margin:0 0 10px 0; font-size:22px; color:#222;">Hi [Guest Name],</h2>
              <p style="margin:0 0 20px 0; font-size:16px; line-height:1.5;">
                You’re invited to <strong>[Event Name]</strong>.  
                Please confirm your attendance so we can reserve your spot.
              </p>

              <!-- Progress Bar -->
              <div style="background-color:#eee; border-radius:20px; overflow:hidden; width:100%; margin:20px 0;">
                <div style="background-color:#4caf50; width:60%; height:20px;"></div>
              </div>
              <p style="margin:0 0 20px 0; font-size:14px; color:#555;">
                60% of seats already confirmed — don’t miss out!
              </p>

              <!-- Button -->
              <p style="text-align:center;">
                <a href="[RSVP-Link]" style="background-color:#4caf50; color:#fff; text-decoration:none; padding:12px 24px; border-radius:4px; font-size:16px; font-weight:bold;">
                  Confirm Attendance
                </a>
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background-color:#f9f9f9; padding:15px; text-align:center; font-size:12px; color:#777;">
              © 2026 [Your Service Name] • This is an RSVP reminder email
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
